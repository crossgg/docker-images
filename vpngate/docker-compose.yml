## Linux 主机使用。
## Web 与 Runner 分离成两个容器，避免 OpenVPN 改写 Runner 路由时影响 UI 访问。
## 该文件依赖 Linux 宿主机/内核提供的网络能力，包含 privileged、NET_ADMIN、Linux 路由策略等行为。
services:
  vpngate-web:
    image: crosscc/vpngate:latest
    container_name: vpngate-web
    init: true
    restart: unless-stopped
    environment:
      PORT: "8080"
      RUNNER_API_URL: "http://vpngate-runner:18081"
      WEB_USERNAME: "${WEB_USERNAME:-}"
      WEB_PASSWORD: "${WEB_PASSWORD:-}"
    ports:
      - "8082:8080"
    depends_on:
      - vpngate-runner
    command: ["/usr/local/bin/vpngate-web"]

  vpngate-runner:
    # Linux 场景：runner 在容器内直接使用 Linux 网络能力与 TUN/OpenVPN 流程。
    image: crosscc/vpngate:latest
    container_name: vpngate-runner
    init: true
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      RUNNER_CONTROL_ADDR: ":18081"
      SOCKS_LISTEN_ADDR: "0.0.0.0:1080"
      SOCKS_USERNAME: "${SOCKS_USERNAME:-}"
      SOCKS_PASSWORD: "${SOCKS_PASSWORD:-}"
      SOCKS_BYPASS_CIDRS: "${SOCKS_BYPASS_CIDRS:-10.0.0.0/24}"
      AUTO_CONNECT: "${AUTO_CONNECT:-true}"
      MONITOR_URL: "${MONITOR_URL:-https://www.gstatic.com/generate_204}"
      MONITOR_FAILURE_THRESHOLD: "${MONITOR_FAILURE_THRESHOLD:-3}"
      TCP_PROBE_ADDRESS: "${TCP_PROBE_ADDRESS:-}"
      TCP_PROBE_TIMEOUT: "${TCP_PROBE_TIMEOUT:-3s}"
      OPENVPN_CONNECT_TIMEOUT: "${OPENVPN_CONNECT_TIMEOUT:-30s}"
      MONITOR_INTERVAL: "${MONITOR_INTERVAL:-20s}"
      MONITOR_TIMEOUT: "${MONITOR_TIMEOUT:-6s}"
      FETCH_TIMEOUT: "${FETCH_TIMEOUT:-30s}"
      CONNECT_COOLDOWN: "${CONNECT_COOLDOWN:-5s}"
      MONITOR_STABLE_AFTER: "${MONITOR_STABLE_AFTER:-10s}"
      NODE_QUARANTINE: "${NODE_QUARANTINE:-5m}"
      BYPASS_ROUTE_TABLE: "${BYPASS_ROUTE_TABLE:-100}"
      BYPASS_FWMARK: "${BYPASS_FWMARK:-1}"
    command: ["/usr/local/bin/vpngate-runner"]
    ports:
      - "10080:1080"
